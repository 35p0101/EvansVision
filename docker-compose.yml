services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evansvision}
      POSTGRES_USER: ${POSTGRES_USER:-evans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evans_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evans} -d ${POSTGRES_DB:-evansvision}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      MODEL_PATH: /app/saved_models
      ALLOWED_ORIGINS: ${AI_ALLOWED_ORIGINS:-http://localhost:4000,http://backend:4000}
    volumes:
      - ai_models:/app/saved_models
      - ai_datasets:/app/datasets
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://evans:evans_secret@postgres:5432/evansvision}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_generate_with_openssl_rand_hex_32}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  ai_models:
  ai_datasets:
